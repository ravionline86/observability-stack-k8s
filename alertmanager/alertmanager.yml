# ============================================================
# Alertmanager Configuration
# Routes alerts to appropriate channels
# NOTE: Email/Slack disabled by default — enable by filling
#       in your own credentials (see comments below)
# ============================================================

global:
  resolve_timeout: 5m

# ── Routing tree ──────────────────────────────────────────
route:
  group_by: ['alertname', 'team', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default-receiver'

  routes:
    # Critical alerts → immediate notification
    - match:
        severity: critical
      receiver: 'critical-receiver'
      repeat_interval: 1h

    # Warning alerts → standard channel
    - match:
        severity: warning
      receiver: 'warning-receiver'
      repeat_interval: 4h

    # Observability team alerts
    - match:
        team: observability
      receiver: 'default-receiver'

# ── Receivers ─────────────────────────────────────────────
receivers:

  # Default: logs to console only (works out of the box)
  - name: 'default-receiver'
    # No external config needed — Alertmanager UI at :9093 shows all alerts

  # Critical receiver — uncomment & fill in to enable email
  - name: 'critical-receiver'
    # email_configs:
    #   - to: 'your-email@example.com'
    #     from: 'alertmanager@yourdomain.com'
    #     smarthost: 'smtp.gmail.com:587'
    #     auth_username: 'your-email@example.com'
    #     auth_password: 'your-app-password'
    #     send_resolved: true
    #     headers:
    #       Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'

    # Slack — uncomment & fill webhook URL to enable
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    #     channel: '#alerts-critical'
    #     send_resolved: true
    #     title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'warning-receiver'
    # Same options as above — fill in when ready

# ── Inhibition rules ──────────────────────────────────────
inhibit_rules:
  # Suppress warning if critical is already firing for same target
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
