# ============================================================
# Logstash Pipeline
# Ingests JSON logs from sample-app → Elasticsearch
# ============================================================

input {
  # Accept logs sent to port 5000 (TCP/UDP)
  tcp {
    port => 5000
    codec => json_lines
  }
  udp {
    port => 5000
    codec => json_lines
  }
  # Also read from stdin for debugging
  stdin {
    codec => json_lines
  }
}

filter {
  # Parse timestamp from our JSON app logs
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Normalize log level field
  if [level] {
    mutate {
      uppercase => ["level"]
      rename => { "level" => "log_level" }
    }
  }

  # Add environment tag
  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "app-logs"
      "stack" => "observability-stack-k8s"
    }
  }

  # Drop health check noise
  if [path] == "/health" or [path] == "/ready" or [path] == "/metrics" {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"
    action => "index"
  }

  # Also output to stdout for debugging (comment out in prod)
  stdout {
    codec => rubydebug
  }
}
