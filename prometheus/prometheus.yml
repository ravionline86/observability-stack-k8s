# ============================================================
# Prometheus Configuration
# Scrapes: sample-app, node-exporter, prometheus itself
# ============================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: 'local-dev'
    project: 'observability-stack-k8s'

# Load alerting rules
rule_files:
  - "alert_rules.yml"

# Alertmanager connection
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ──────────────────────────────────────────────
# Scrape targets
# ──────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Sample 5G-style microservice app
  - job_name: 'sample-app'
    static_configs:
      - targets: ['sample-app:8080']
        labels:
          service: 'sample-app'
          team: 'core-network'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Node Exporter — host system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          component: 'infrastructure'

  # Alertmanager self-monitoring
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: 'alertmanager'
